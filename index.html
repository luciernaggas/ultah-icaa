
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Selamat Ulang Tahun, ICAA!</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to right, #ffdde1, #ee9ca7);
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      text-align: center;
      overflow: hidden;
    }
    h1 {
      margin-top: 50px;
      font-size: 3em;
    }
    p {
      font-size: 1.5em;
      padding: 0 20px;
    }
    .love {
      position: absolute;
      width: 20px;
      height: 20px;
      background: red;
      transform: rotate(45deg);
      animation: fall 5s infinite;
    }
    .love::before, .love::after {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      background: red;
      border-radius: 50%;
    }
    .love::before {
      top: -10px;
      left: 0;
    }
    .love::after {
      left: -10px;
      top: 0;
    }
    @keyframes fall {
      0% {
        top: -10%;
        left: calc(100% * var(--x));
        opacity: 1;
      }
      100% {
        top: 110%;
        left: calc(100% * var(--x) + 50px);
        opacity: 0;
      }
    }
    audio {
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <h1>Selamat Ulang Tahun, ICAA! 🎉</h1>
  <p>Aku cuma mau bilang... hari ini istimewa banget, karena hari ini kamu lahir ke dunia.  
  Terima kasih udah jadi cahaya buat hariku.  
  Aku sayang kamu, Ica!</p>
  <audio controls autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    Browser kamu tidak mendukung audio.
  </audio>
  <script>
    for (let i = 0; i < 30; i++) {
      let love = document.createElement('div');
      love.className = 'love';
      love.style.setProperty('--x', Math.random());
      love.style.left = `${Math.random() * 100}%`;
      love.style.animationDuration = `${3 + Math.random() * 3}s`;
      document.body.appendChild(love);
    }
  </script>
</body>
</html>
